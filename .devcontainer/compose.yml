services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    volumes:
      - ../volumes/db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sql_email
    ports:
      - "5432:5432"

  dev:
    tty: true
    hostname: devcontainer
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile.devcontainer
      pull: true
      args:
        PROJECT_NAME: sql-email
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sql_email
    volumes:
      # Workspace
      - ..:/workspace/sql-email:cached
      # Home
      - ../volumes/home:/home/vscode:cached
      # Additional scripts
      - ~/scripts:/home/vscode/scripts:ro
    # networks:
    #   agent-team-bridge-network:
    #     aliases:
    #       - sql-email
# networks:
#   agent-team-bridge-network:
#     name: agent-team-bridge

